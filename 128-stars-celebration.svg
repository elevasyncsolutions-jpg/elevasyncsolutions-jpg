<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0a500"/>
      <stop offset="100%" stop-color="#d4890a"/>
    </linearGradient>
    <linearGradient id="star" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#f0a500"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="600" y="100" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="28" fill="#8b949e" letter-spacing="4">RUSTCHAIN</text>
  <text x="600" y="150" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="20" fill="#484f58" letter-spacing="2">PROOF OF ANTIQUITY</text>
  <circle cx="600" cy="310" r="120" fill="none" stroke="url(#gold)" stroke-width="3" stroke-dasharray="8 6" opacity="0.5"/>
  <circle cx="600" cy="310" r="100" fill="none" stroke="url(#gold)" stroke-width="2" stroke-dasharray="4 4" opacity="0.3"/>
  <text x="600" y="270" text-anchor="middle" font-family="Georgia,serif" font-size="100" font-weight="bold" fill="url(#star)" filter="url(#glow)">★</text>
  <text x="600" y="400" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="80" font-weight="700" fill="#f0a500">128</text>
  <text x="600" y="440" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" fill="#8b949e" letter-spacing="3">GITHUB STARS</text>
  <rect x="470" y="470" width="260" height="44" rx="22" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <text x="600" y="500" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" fill="#f0a500" font-weight="600" letter-spacing="1">STARSTRUCK BRONZE</text>
  <text x="600" y="550" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" fill="#484f58">Elyan Labs · github.com/Scottcjn/Rustchain</text>
  <text x="600" y="575" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#30363d">Thank you to all 128 contributors and miners ⛏</text>
</svg>